name: "🐞 Bug in production"
description: "Bug in production environment"
title: "[What] doesn't work? [Where] does it not work? [Under] what conditions?"
labels:
  - "bug:production"
assignees: []
body:
  - type: textarea
    id: current_behaviour
    attributes:
      label: "Current Behavior"
      description: "Provide a description of the actual behavior with supporting screenshots or videos"
    validations:
      required: true
  - type: textarea
    id: expected_behaviour
    attributes:
      label: "Expected Behavior"
      description: "Describe the desired behavior"
    validations:
      required: true
  - type: textarea
    id: steps_to_reproduction
    attributes:
      label: "Steps to reproduce"
      description: "Detail the steps that would replicate this issue"
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: additional_information
    attributes:
      label: "Additional Information"
      description: "Add any additional context here: device, OS, browser, versions and so on"
      value: "Browser with version: \n"
    validations:
      required: false
  - type: textarea
    id: related_tickets
    attributes:
      label: ""
      description: "Specify links to related user tickets"
      placeholder: "```[tasklist] \n
                    ### Tasks \n
                    ```"
    validations:
      required: false
